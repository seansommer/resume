<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sean David Sommer - Interactive Resume</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #5c94fc; /* Retro sky blue */
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on mobile */
            user-select: none;
            -webkit-user-select: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Persistent Header / HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            text-align: center;
            padding: 10px 0;
            z-index: 10;
            pointer-events: none;
        }
        #hud h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        #hud p { margin: 5px 0 0 0; font-size: 14px; color: #ffcc00;}

        /* Mobile On-Screen Controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 20;
        }
        .btn-group { display: flex; gap: 15px; }
        .ctrl-btn {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        .ctrl-btn:active { background: rgba(255, 255, 255, 0.8); }

        /* Modal Overlay for Resume Content */
        #modal-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 30;
            justify-content: center;
            align-items: center;
        }
        #modal-content {
            background: #fff;
            width: 90%;
            max-width: 650px;
            max-height: 80vh;
            border: 4px solid #000;
            border-radius: 10px;
            padding: 25px;
            box-sizing: border-box;
            overflow-y: auto;
            position: relative;
            box-shadow: 8px 8px 0 rgba(0,0,0,1);
            font-family: Arial, sans-serif;
            color: #333;
        }
        #modal-content h3 { color: #d32f2f; border-bottom: 2px solid #ccc; padding-bottom: 5px; margin-top: 0;}
        #modal-content h4 { margin: 15px 0 5px 0; color: #111;}
        #modal-content em { color: #555; font-size: 14px; }
        #modal-content p, #modal-content ul { line-height: 1.5; font-size: 15px; }
        #modal-content li { margin-bottom: 8px; }
        .close-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #d32f2f;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            border: 2px solid black;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .close-btn:hover { background: #b71c1c; }

        /* Hide mobile controls on larger screens */
        @media(min-width: 800px) {
            #mobile-controls { display: none; }
        }
    </style>
</head>
<body>

    <div id="hud">
        <h1>SEAN DAVID SOMMER</h1>
        <p>Vista, CA 92083 | 760-420-1807 | MusicManSean@me.com</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div class="btn-group">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
        <div class="ctrl-btn" id="btn-jump">▲</div>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <div id="resume-text"></div>
            <button class="close-btn" onclick="closeModal()">Close & Keep Playing</button>
        </div>
    </div>

<script>
    // --- RESUME DATA ---
    const resumeData = {
        summary: `
            <h3>PROFESSIONAL SUMMARY</h3>
            <p>I am a well-rounded professional with more than ten years of experience supporting office operations, customer service, inventory management, and business administration. My background spans fast-paced retail, warehouse, and compliance driven environments, including hands-on technical support and inventory management at Apple, high-volume inventory and merchandising work at Costco, and full-cycle operations for a California based compliance company. I am dependable, easy to work with, and committed to delivering high-quality service as part of a team.</p>
        `,
        skills: `
            <h3>TECHNICAL SKILLS & CORE COMPETENCIES</h3>
            <ul>
                <li><strong>Customer Service:</strong> Conflict Resolution, Project Management Software, Client Relationship Management.</li>
                <li><strong>Administration:</strong> Accounts Payable/Receivable, Inventory Management, Project Coordination, Human Resources.</li>
                <li><strong>Inventory, Warehouse & Logistics:</strong> End-to-end inventory management, order processing, shipping and receiving, warehouse organization, cycle counts, and certified forklift operation for diesel truck filters and parts.</li>
                <li><strong>Technical:</strong> MacOS & Windows Troubleshooting, Adobe Creative Suite (Audio/Video), Microsoft Office (Excel, Word).</li>
                <li><strong>Remote Collaboration:</strong> Zoom, Slack, Microsoft Teams, Google Workspace, Dropbox.</li>
            </ul>
        `,
        experience: `
            <h3>PROFESSIONAL EXPERIENCE</h3>
            <h4>Digital Media Producer & Community Manager | Self-Employed / Remote Vista, CA</h4>
            <em>November 2017 – Present</em>
            <p>Founded, developed, and managed a digital media brand focused on meditation and mental wellness, overseeing all aspects of production, marketing, and community engagement.</p>
            <ul>
                <li><strong>Content Production:</strong> Utilized advanced audio and video editing software to create high-quality digital content, growing a subscriber base through consistent output.</li>
                <li><strong>Community Support:</strong> Managed all community interactions, responding to user comments and inquiries promptly and professionally to foster audience loyalty.</li>
                <li><strong>Analytics & Strategy:</strong> Analyzed viewer data and engagement metrics to optimize content strategy, similar to analyzing customer satisfaction scores in a corporate environment.</li>
                <li><strong>Remote Operations:</strong> Successfully designed, built, implemented and managed a fully remote workflow, demonstrating self-discipline, time management, and the ability to meet strict publication deadlines without supervision.</li>
                <li><strong>Accounting & Tax Reporting:</strong> Maintained accurate financial records, tracked income and expenses, prepared reports for tax filing, and coordinated required documentation to support ongoing compliance as a self-employed business.</li>
            </ul>
            <hr>
            <h4>General Manager & Office Administrator | Diesel Pollution Solutions, Inc. San Marcos, CA</h4>
            <em>February 2011 – November 2017</em>
            <p>Served as the operational lead for a compliance firm, managing office administration, finance, and client relations.</p>
            <ul>
                <li><strong>Office Administration:</strong> Directed daily business operations, including phone screening, scheduling, and digital record keeping for maintaining customer’s compliance for CARB.</li>
                <li><strong>Financial Management:</strong> Managed Accounts Payable/Receivable, processed invoices, and handled payroll reporting using accounting software.</li>
                <li><strong>Client Relations:</strong> Primary point of contact for key accounts, resolving complex client issues regarding California pollution regulations.</li>
                <li><strong>Project Management:</strong> Responsible for technicians and compliance projects, ensuring all deliverables met strict state regulatory deadlines.</li>
                <li><strong>Warehouse Management:</strong> Managed diesel truck filter and parts inventory from end to end, including ordering, stock control, and cycle counts. Handled shipping and receiving, organized warehouse layout, and safely operated forklifts as a certified operator.</li>
            </ul>
            <hr>
            <h4>Operations Specialist | Apple Retail Carlsbad, CA</h4>
            <em>August 2009 – 2011</em>
            <p>Worked in a high-speed, technical environment for one of the world’s leading technology brands.</p>
            <ul>
                <li><strong>Inventory Control:</strong> Managed high-value inventory, shipping, and receiving processes with near-zero error rates.</li>
                <li><strong>Technical Workflow:</strong> Utilized Apple proprietary software and handheld devices to track stock levels and fulfill customer orders efficiently.</li>
                <li><strong>Team Collaboration:</strong> Communicated effectively with the sales and technical support teams (Genius Bar) to ensure seamless customer experiences.</li>
            </ul>
            <hr>
            <h4>Merchandiser | Costco Wholesale Vista, CA</h4>
            <em>November 2007 – 2009</em>
            <p>Supported warehouse operations, working across the cooler and front-end areas to ensure efficient product flow and customer support.</p>
            <ul>
                <li>Maintained visual merchandising standards in a high-volume warehouse environment.</li>
                <li>Consistently demonstrated reliability and efficiency in stocking and organizing products to maximize sales potential.</li>
                <li>Operated safely in a fast-paced team environment, adhering to strict corporate safety protocols.</li>
            </ul>
        `,
        education: `
            <h3>EDUCATION</h3>
            <p><strong>Associate Level Coursework | MiraCosta Community College</strong><br>
            <em>2005 – 2007</em><br>
            Focus: General Education</p>
        `,
        projects: `
            <h3>PROJECTS & INTERESTS</h3>
            <ul>
                <li><strong>Audio/Video Engineering:</strong> Proficient in recording, mixing, and editing digital media.</li>
                <li><strong>Web Development:</strong> Experience with website design and graphic layout.</li>
                <li><strong>Music:</strong> Songwriting, recording, and guitar.</li>
            </ul>
        `
    };

    // --- GAME ENGINE ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let worldWidth = 1800;
    let groundHeight = 60;
    let isPaused = false;
    let cameraX = 0;
    let animationFrame = 0;

    // Player Object
    const player = {
        x: 50, y: 100, w: 30, h: 40,
        vx: 0, vy: 0,
        speed: 6, jumpPower: -13, gravity: 0.6,
        grounded: false, moving: false
    };

    // Define Level Blocks
    const blocks = [
        { id: 'summary', text: 'SUMMARY', x: 250, y: 0, w: 120, h: 40, hitTimer: 0 },
        { id: 'skills', text: 'SKILLS', x: 550, y: 0, w: 120, h: 40, hitTimer: 0 },
        { id: 'experience', text: 'EXPERIENCE', x: 850, y: 0, w: 150, h: 40, hitTimer: 0 },
        { id: 'education', text: 'EDUCATION', x: 1200, y: 0, w: 130, h: 40, hitTimer: 0 },
        { id: 'projects', text: 'PROJECTS', x: 1550, y: 0, w: 130, h: 40, hitTimer: 0 }
    ];

    const keys = { left: false, right: false, jump: false };

    // Set dynamic block heights based on screen size
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let blockY = canvas.height - groundHeight - 160; 
        blocks.forEach(b => b.y = blockY);
    }
    window.addEventListener('resize', resize);
    resize();

    // --- INPUT HANDLING ---
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = false;
    });

    // Touch controls
    const bindTouch = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    };
    bindTouch('btn-left', 'left');
    bindTouch('btn-right', 'right');
    bindTouch('btn-jump', 'jump');

    // --- PHYSICS & LOGIC ---
    function update() {
        if (isPaused) return;

        // Horizontal Movement
        if (keys.left) { player.vx = -player.speed; player.moving = true; }
        else if (keys.right) { player.vx = player.speed; player.moving = true; }
        else { player.vx = 0; player.moving = false; }

        player.x += player.vx;
        
        // World Bounds (Left / Right)
        if (player.x < 0) player.x = 0;
        if (player.x + player.w > worldWidth) player.x = worldWidth - player.w;

        // Horizontal Collisions with blocks
        blocks.forEach(b => {
            if (isColliding(player, b)) {
                if (player.vx > 0) player.x = b.x - player.w;
                else if (player.vx < 0) player.x = b.x + b.w;
            }
        });

        // Vertical Movement (Gravity & Jump)
        if (keys.jump && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }

        player.vy += player.gravity;
        player.y += player.vy;
        player.grounded = false;

        // Vertical Collisions with blocks
        blocks.forEach(b => {
            if (isColliding(player, b)) {
                if (player.vy > 0) { // Landing on top
                    player.y = b.y - player.h;
                    player.vy = 0;
                    player.grounded = true;
                } else if (player.vy < 0) { // Hitting from below
                    player.y = b.y + b.h;
                    player.vy = 0;
                    hitBlock(b);
                }
            }
        });

        // Ground Collision
        if (player.y + player.h >= canvas.height - groundHeight) {
            player.y = canvas.height - groundHeight - player.h;
            player.vy = 0;
            player.grounded = true;
        }

        // Camera Follow
        cameraX = player.x - canvas.width / 2 + player.w / 2;
        if (cameraX < 0) cameraX = 0;
        if (cameraX > worldWidth - canvas.width) cameraX = worldWidth - canvas.width;

        // Block animation decrement
        blocks.forEach(b => { if (b.hitTimer > 0) b.hitTimer--; });

        animationFrame++;
    }

    function isColliding(p, b) {
        return (p.x < b.x + b.w && p.x + p.w > b.x && p.y < b.y + b.h && p.y + p.h > b.y);
    }

    function hitBlock(block) {
        block.hitTimer = 10; // Visual bounce
        isPaused = true;
        document.getElementById('resume-text').innerHTML = resumeData[block.id];
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    window.closeModal = function() {
        document.getElementById('modal-overlay').style.display = 'none';
        keys.jump = false; // Prevent accidental double jumps
        isPaused = false;
    }

    // --- DRAWING ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-cameraX, 0);

        // Draw Scenery (Background Instructions & Clouds)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.font = '24px Courier New';
        ctx.fontWeight = 'bold';
        ctx.fillText("Use Arrow Keys to Move, SPACE to Jump.", 50, canvas.height / 2 - 50);
        ctx.fillText("Hit the blocks from below to read!", 50, canvas.height / 2 - 10);
        ctx.fillText("Keep going right! ➡", 1000, canvas.height / 2);

        // Draw Ground
        ctx.fillStyle = '#8B4513'; // Dirt
        ctx.fillRect(0, canvas.height - groundHeight, worldWidth, groundHeight);
        ctx.fillStyle = '#228B22'; // Grass
        ctx.fillRect(0, canvas.height - groundHeight, worldWidth, 15);

        // Draw Blocks
        blocks.forEach(b => {
            let drawY = b.y - (b.hitTimer > 5 ? 10 - b.hitTimer : b.hitTimer); // bounce effect
            
            // Block background
            ctx.fillStyle = b.hitTimer > 0 ? '#b5651d' : '#F8B400';
            ctx.fillRect(b.x, drawY, b.w, b.h);
            
            // Block border/shadow
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#000';
            ctx.strokeRect(b.x, drawY, b.w, b.h);
            
            // Block Text
            ctx.fillStyle = '#000';
            ctx.font = 'bold 18px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(b.text, b.x + b.w / 2, drawY + b.h / 2);
        });

        // Draw Player (8-bit style representation)
        drawPlayer(player.x, player.y);

        ctx.restore();
    }

    function drawPlayer(x, y) {
        // A simple pixelated character using rectangles
        // Shirt/Overalls
        ctx.fillStyle = '#0000FF'; // Blue
        ctx.fillRect(x + 6, y + 20, 18, 14);
        
        // Face
        ctx.fillStyle = '#FFDAB9'; // Peach
        ctx.fillRect(x + 4, y + 8, 22, 12);
        
        // Hat
        ctx.fillStyle = '#FF0000'; // Red
        ctx.fillRect(x + 2, y, 22, 8);
        ctx.fillRect(x + 24, y + 4, 8, 4); // Hat brim

        // Eye/Mustache
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 20, y + 10, 4, 4); // Eye
        ctx.fillRect(x + 18, y + 16, 10, 4); // Mustache

        // Arms
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x, y + 20, 6, 10);
        ctx.fillRect(x + 24, y + 20, 6, 10);

        // Legs (Animated if moving and grounded)
        ctx.fillStyle = '#8B4513'; // Brown Shoes
        if (!player.grounded) {
            // Jumping pose
            ctx.fillRect(x + 2, y + 34, 10, 6);
            ctx.fillRect(x + 18, y + 30, 10, 6);
        } else if (player.moving && Math.floor(animationFrame / 5) % 2 === 0) {
            // Running frame 1
            ctx.fillRect(x + 8, y + 34, 10, 6);
            ctx.fillRect(x + 20, y + 32, 10, 6);
        } else {
            // Standing or Running frame 2
            ctx.fillRect(x + 4, y + 34, 10, 6);
            ctx.fillRect(x + 16, y + 34, 10, 6);
        }
    }

    // --- GAME LOOP ---
    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }
    
    // Start Game
    loop();

</script>
</body>
</html>
